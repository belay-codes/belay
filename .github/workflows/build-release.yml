name: Build Release

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. belay-v0.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    if: >
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release list --limit 1 --json tagName --jq '.[].tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p Belay.iconset
          sips -z 16 16     public/Belay.png --out Belay.iconset/icon_16x16.png
          sips -z 32 32     public/Belay.png --out Belay.iconset/icon_16x16@2x.png
          sips -z 32 32     public/Belay.png --out Belay.iconset/icon_32x32.png
          sips -z 64 64     public/Belay.png --out Belay.iconset/icon_32x32@2x.png
          sips -z 128 128   public/Belay.png --out Belay.iconset/icon_128x128.png
          sips -z 256 256   public/Belay.png --out Belay.iconset/icon_128x128@2x.png
          sips -z 256 256   public/Belay.png --out Belay.iconset/icon_256x256.png
          sips -z 512 512   public/Belay.png --out Belay.iconset/icon_256x256@2x.png
          sips -z 512 512   public/Belay.png --out Belay.iconset/icon_512x512.png
          sips -z 1024 1024 public/Belay.png --out Belay.iconset/icon_512x512@2x.png
          iconutil -c icns Belay.iconset -o public/Belay.icns

      - name: Install npm dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release list --limit 1 --json tagName --jq '.[].tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync package version to release tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#belay-v}"
          VERSION="${VERSION#v}"
          echo "Setting belay-app version to $VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/belay-code/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('packages/belay-code/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/belay-code
